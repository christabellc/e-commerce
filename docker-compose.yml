# Spins up Postgres + Redis so reviewers can run the backend with one command.
# The Node app runs on the host (npm run dev); these are its dependencies.
services:
  postgres:
    image: postgres:16-alpine
    container_name: buckets_pg
    environment:
      POSTGRES_USER: buckets
      POSTGRES_PASSWORD: buckets
      POSTGRES_DB: buckets
    ports:
      - "5432:5432"
    volumes:
      - buckets_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buckets"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: buckets_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  buckets_pg_data:
